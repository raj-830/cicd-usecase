steps:
  # ==========================================
  # Step 1: Create the Dockerfile dynamically
  # ==========================================
  - name: 'ubuntu'
    id: 'Create Dockerfile'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cat <<EOF > Dockerfile
        FROM scratch
        COPY template.zip ./
        EOF
        echo "Dockerfile created successfully."

  # ==========================================
  # Step 2: Install tools, zip, build with podman, and push
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'Build and Push with Podman'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # 1. Install podman and zip
        apt-get update && apt-get -y install podman zip

        # 2. Zip the repository contents (excluding the Dockerfile itself)
        zip -r template.zip . -x Dockerfile

        # 3. Build the image using Podman with annotations targeting the external project
        podman build . \
          -t $_REGION-docker.pkg.dev/$_ARTIFACT_PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:latest \
          --annotation=com.easysaas.engine.type=im \
          --annotation=com.easysaas.engine.version=1.5.7 \
          --no-cache

        # 4. Authenticate Podman to Artifact Registry using the short-lived gcloud token
        gcloud auth print-access-token | podman login -u oauth2accesstoken --password-stdin $_REGION-docker.pkg.dev

        # 5. Push both tags to the external project registry
        podman push $_REGION-docker.pkg.dev/$_ARTIFACT_PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:latest

  # ==========================================
  # Step 3: Create App-Lifecycle Manager Release
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'Create ALM Release'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # App-Lifecycle Manager commands are currently in beta component
        gcloud beta app-lifecycle-manager releases create "$_ALM_RELEASE_NAME" \
            --project="$_ALM_PROJECT_ID" \
            --location="$_ALM_LOCATION" \
            --unit-kind="$_ALM_UK_NAME" \
            --blueprint-package="$_REGION-docker.pkg.dev/$_ARTIFACT_PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:latest"

# Define your environment variables here
substitutions:
  # Artifact Registry Configuration
  _REGION: 'us-central1'
  _ARTIFACT_PROJECT_ID: 'saas-demo-496915' # Target registry project
  _REPO_NAME: 'cicd-usecase'
  _IMAGE_NAME: 'test-gcs1'

  # App-Lifecycle Manager Configuration
  _ALM_RELEASE_NAME: 'cicd-rls2'
  _ALM_PROJECT_ID: 'saas-demo-496915'
  _ALM_LOCATION: 'us-central1'
  _ALM_UK_NAME: 'cicd-uk1'

options:
  logging: CLOUD_LOGGING_ONLY